[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "generic-ml-cache-cli"
dynamic = ["version"]
description = "Terminal UI for generic-ml-cache: the gmlcache command. A thin inbound driver over generic-ml-cache-core -- reads config, provides the data source, maps commands onto the core library."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
authors = [{ name = "Daniel Slobozian" }]
keywords = ["cache", "llm", "ai", "cli", "agent", "claude", "codex", "cursor", "replay"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Utilities",
]
dependencies = [
    "generic-ml-cache-core>=0.27.0",
    "generic-ml-cache-adapters>=0.27.0",
    "argcomplete>=3,<4",
]

[project.urls]
Homepage = "https://github.com/danielslobozian/generic-ml-cache"
Repository = "https://github.com/danielslobozian/generic-ml-cache"
Issues = "https://github.com/danielslobozian/generic-ml-cache/issues"
Changelog = "https://github.com/danielslobozian/generic-ml-cache/blob/main/CHANGELOG.md"

[project.scripts]
gmlcache = "generic_ml_cache_cli.cli:main"

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-cov", "pytest-timeout", "coverage>=7", "vulture>=2", "ruff>=0.15", "import-linter>=2", "pyright>=1.1"]

[tool.hatch.version]
source = "regex"
path = "../../VERSION"
pattern = "^(?P<version>[^\\n]+)"

[tool.hatch.build.targets.wheel]
packages = ["src/generic_ml_cache_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -v --cov=generic_ml_cache_cli --cov-fail-under=80"
timeout = 60


[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
extend-select = ["C901"]

[tool.ruff.lint.mccabe]
max-complexity = 10
