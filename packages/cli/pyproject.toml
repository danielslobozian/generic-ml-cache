[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "generic-ml-cache-cli"
dynamic = ["version"]
description = "Terminal UI for generic-ml-cache: the gmlcache command. A thin inbound driver over generic-ml-cache-core -- reads config, provides the data source, maps commands onto the core library."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
authors = [{ name = "Daniel Slobozian" }]
keywords = ["cache", "llm", "ai", "cli", "agent", "claude", "codex", "cursor", "replay"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Utilities",
]
dependencies = [
    "generic-ml-cache-core==0.29.*",
    "generic-ml-cache-bootstrap==0.29.*",
    "argcomplete>=3,<4",
]

[project.urls]
Homepage = "https://github.com/danielslobozian/generic-ml-cache"
Repository = "https://github.com/danielslobozian/generic-ml-cache"
Issues = "https://github.com/danielslobozian/generic-ml-cache/issues"
Changelog = "https://github.com/danielslobozian/generic-ml-cache/blob/main/CHANGELOG.md"

[project.scripts]
gmlcache = "generic_ml_cache_cli.cli:main"

[project.optional-dependencies]
# `pip install "generic-ml-cache-cli[encryption]"` pulls the encryption extra
# (cryptography) at the SAME version — the CLI's encrypt/decrypt/rotate commands
# need it. Routed through bootstrap (the CLI no longer depends on the adapters
# package directly, W28). Lockstep-pinned to the workspace version.
encryption = ["generic-ml-cache-bootstrap[encryption]==0.29.*"]
dev = ["pytest>=7", "pytest-cov", "pytest-timeout", "coverage>=7", "ruff>=0.15", "import-linter>=2", "pyright>=1.1"]

[tool.hatch.version]
source = "regex"
path = "../../VERSION"
pattern = "^(?P<version>[^\\n]+)"

[tool.hatch.build.targets.wheel]
packages = ["src/generic_ml_cache_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Treat warnings as errors: a regression lock that catches the next upstream
# deprecation (or our own) at first appearance (CA9). Add a narrow
# "ignore::Cat:module" entry with a justification only for an unfixable
# third-party warning — never blanket.
filterwarnings = ["error"]
addopts = "-ra -v --cov-branch --cov=generic_ml_cache_cli --cov-fail-under=80"
timeout = 60


[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
extend-select = ["C901", "I", "B", "N", "S310", "UP", "BLE001"]

[tool.ruff.lint.mccabe]
max-complexity = 10
