[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "generic-ml-cache-core"
dynamic = ["version"]
description = "Hexagonal core library for generic-ml-cache: domain model, use cases, and port contracts. The default adapters ship in generic-ml-cache-adapters; inject a data source to use them."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
authors = [{ name = "Daniel Slobozian" }]
keywords = ["cache", "llm", "ai", "hexagonal", "ports-and-adapters", "library", "replay"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/danielslobozian/generic-ml-cache"
Repository = "https://github.com/danielslobozian/generic-ml-cache"
Issues = "https://github.com/danielslobozian/generic-ml-cache/issues"
Changelog = "https://github.com/danielslobozian/generic-ml-cache/blob/main/CHANGELOG.md"

[project.optional-dependencies]
# The shipped test-support kit (generic_ml_cache_core.testing) needs pytest for its
# conformance TCK. It sits behind this extra so the core RUNTIME stays dependency-free
# (`dependencies = []`): a consumer running the TCK against their own PersistenceBackend
# installs `generic-ml-cache-core[test]`.
test = ["pytest>=7"]
dev = ["pytest>=7", "pytest-cov", "pytest-timeout", "coverage>=7", "ruff>=0.15", "import-linter>=2", "pyright>=1.1"]

[tool.hatch.version]
source = "regex"
path = "../../VERSION"
pattern = "^(?P<version>[^\\n]+)"

[tool.hatch.build.targets.wheel]
packages = ["src/generic_ml_cache_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Treat warnings as errors: a regression lock that catches the next upstream
# deprecation (or our own) at first appearance (CA9). Add a narrow
# "ignore::Cat:module" entry with a justification only for an unfixable
# third-party warning — never blanket.
filterwarnings = ["error"]
addopts = "-ra --cov-branch --cov=generic_ml_cache_core --cov-fail-under=85"
timeout = 60

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
extend-select = ["C901", "I", "B", "N", "S310", "UP", "BLE001"]

[tool.ruff.lint.per-file-ignores]
# The domain exceptions are deliberately named for the condition they signal
# (CacheMiss, UnknownClient, ArtifactBlobMissing, …), not with an -Error suffix.
# That naming is intentional, so the N818 "error-suffix" rule is a false positive here.
"src/generic_ml_cache_core/common/errors.py" = ["N818"]

[tool.ruff.lint.mccabe]
max-complexity = 10
