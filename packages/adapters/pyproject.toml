[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "generic-ml-cache-adapters"
dynamic = ["version"]
description = "Concrete outbound adapters for generic-ml-cache: SQLite repository, filesystem blob store, AES-GCM encryption, ML client runners (claude, codex, cursor-agent), REST API adapters (anthropic, openai, gemini), metrics, clock, and gateway."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
authors = [{ name = "Daniel Slobozian" }]
keywords = ["cache", "llm", "ai", "hexagonal", "adapters", "sqlite", "anthropic", "openai", "gemini"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
    "generic-ml-cache-core>=0.27.0",
    "structlog>=21",
]

[project.optional-dependencies]
encryption = ["cryptography>=42"]
dev = ["pytest>=7", "pytest-cov", "pytest-timeout", "coverage>=7", "vulture>=2", "ruff>=0.15", "cryptography>=42", "import-linter>=2", "pyright>=1.1"]

[project.entry-points."gmlcache.adapters"]
claude = "generic_ml_cache_adapters.adapter.out.client.claude:ClaudeCliAdapter"
codex = "generic_ml_cache_adapters.adapter.out.client.codex:CodexCliAdapter"
cursor-agent = "generic_ml_cache_adapters.adapter.out.client.cursor:CursorCliAdapter"
anthropic = "generic_ml_cache_adapters.adapter.out.api.anthropic_direct_adapter:AnthropicDirectAdapter"
openai = "generic_ml_cache_adapters.adapter.out.api.openai_direct_adapter:OpenAIDirectAdapter"
gemini = "generic_ml_cache_adapters.adapter.out.api.gemini_direct_adapter:GeminiDirectAdapter"

[project.urls]
Homepage = "https://github.com/danielslobozian/generic-ml-cache"
Repository = "https://github.com/danielslobozian/generic-ml-cache"
Issues = "https://github.com/danielslobozian/generic-ml-cache/issues"
Changelog = "https://github.com/danielslobozian/generic-ml-cache/blob/main/CHANGELOG.md"

[tool.hatch.version]
source = "regex"
path = "../../VERSION"
pattern = "^(?P<version>[^\\n]+)"

[tool.hatch.build.targets.wheel]
packages = ["src/generic_ml_cache_adapters"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --cov=generic_ml_cache_adapters --cov-fail-under=80"
timeout = 60

[tool.ruff]
line-length = 100
target-version = "py310"
