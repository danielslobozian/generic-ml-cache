[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "generic-ml-cache-adapters"
dynamic = ["version"]
description = "Concrete outbound adapters for generic-ml-cache: SQLite repository, filesystem blob store, AES-GCM encryption, ML client runners (claude, codex, cursor-agent), REST API adapters (anthropic, openai, gemini), metrics, clock, and gateway."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
authors = [{ name = "Daniel Slobozian" }]
keywords = ["cache", "llm", "ai", "hexagonal", "adapters", "sqlite", "anthropic", "openai", "gemini"]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
    "generic-ml-cache-core>=1.0.0,<2",
    "structlog>=21",
]

[project.optional-dependencies]
encryption = ["cryptography>=42"]
dev = ["pytest>=7", "pytest-cov", "pytest-timeout", "coverage>=7", "ruff>=0.15", "cryptography>=42", "import-linter>=2", "pyright>=1.1"]

[project.entry-points."gmlcache.adapters"]
claude = "generic_ml_cache_adapters.adapter.outbound.client.claude:ClaudeCliAdapter"
codex = "generic_ml_cache_adapters.adapter.outbound.client.codex:CodexCliAdapter"
cursor-agent = "generic_ml_cache_adapters.adapter.outbound.client.cursor:CursorCliAdapter"
vibe = "generic_ml_cache_adapters.adapter.outbound.client.vibe:VibeCliAdapter"
anthropic = "generic_ml_cache_adapters.adapter.outbound.api.anthropic_direct_adapter:AnthropicDirectAdapter"
openai = "generic_ml_cache_adapters.adapter.outbound.api.openai_direct_adapter:OpenAIDirectAdapter"
gemini = "generic_ml_cache_adapters.adapter.outbound.api.gemini_direct_adapter:GeminiDirectAdapter"
mistral = "generic_ml_cache_adapters.adapter.outbound.api.mistral_direct_adapter:MistralDirectAdapter"

[project.urls]
Homepage = "https://github.com/danielslobozian/generic-ml-cache"
Repository = "https://github.com/danielslobozian/generic-ml-cache"
Issues = "https://github.com/danielslobozian/generic-ml-cache/issues"
Changelog = "https://github.com/danielslobozian/generic-ml-cache/blob/main/CHANGELOG.md"

[tool.hatch.version]
source = "regex"
path = "../../VERSION"
pattern = "^(?P<version>[^\\n]+)"

[tool.hatch.build.targets.wheel]
packages = ["src/generic_ml_cache_adapters"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Treat warnings as errors: a regression lock that catches the next upstream
# deprecation (or our own) at first appearance (CA9). Add a narrow
# "ignore::Cat:module" entry with a justification only for an unfixable
# third-party warning — never blanket.
filterwarnings = ["error"]
addopts = "-ra --cov-branch --cov=generic_ml_cache_adapters --cov-fail-under=80"
timeout = 60

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
extend-select = ["C901", "I", "B", "N", "S310", "UP", "BLE001"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
# The access registry is non-load-bearing by construction (see its module docstring):
# every metrics operation swallows all errors so a metrics failure never breaks a cache
# resolution. Its DbConnection is a driver-agnostic PEP 249 protocol (SQLite/Postgres/…),
# so there is no single DB error type to narrow to — the broad best-effort catch is the
# design (AGENTS §10's "deliberate, commented best-effort boundary"), not a defect.
"src/generic_ml_cache_adapters/adapter/outbound/metrics/access_registry.py" = ["BLE001"]
# Tests catch broadly on purpose to assert best-effort / failure behaviour.
"tests/**" = ["BLE001"]
