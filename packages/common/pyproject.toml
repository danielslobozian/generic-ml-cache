[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "generic-ml-cache-common"
version = "0.18.0"
description = "Internal shared utilities for the generic-ml-cache monorepo. Bundled into CLI and daemon wheels at build time; not published to PyPI separately."
requires-python = ">=3.9"
license = "Apache-2.0"
license-files = ["../../LICENSE", "../../NOTICE"]
authors = [{ name = "Daniel Slobozian" }]

[project.optional-dependencies]
dev = ["pytest>=7", "ruff>=0.15", "pyright>=1.1"]

[tool.hatch.build.targets.wheel]
packages = ["src/generic_ml_cache_common"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
line-length = 100
target-version = "py39"
