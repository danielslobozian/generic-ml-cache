sonar.organization=danielslobozian
sonar.projectKey=danielslobozian_generic-ml-cache

# Four packages: production sources and their tests.
sonar.sources=packages/core/src,packages/cli/src,packages/daemon/src,packages/adapters/src
sonar.tests=packages/core/tests,packages/cli/tests,packages/daemon/tests,packages/adapters/tests

# Supported runtimes (matches the CI test matrix).
sonar.python.version=3.10, 3.11, 3.12, 3.13

# Coverage reports produced by the CI job (Cobertura XML, one per package).
# Paths inside them are repo-root-relative (see .coveragerc: relative_files = true).
sonar.python.coverage.reportPaths=packages/core/coverage.xml,packages/cli/coverage.xml,packages/daemon/coverage.xml,packages/adapters/coverage.xml

# Copy-paste detection is disabled for the provider API adapters. By the
# ports-and-adapters design each provider adapter intentionally shares the same shape --
# identical domain-type imports and near-identical Bearer/HTTP plumbing -- so duplication
# there is the pattern, not a smell, and every new provider would otherwise re-trip the
# gate. This narrows ONLY copy-paste detection for these files; coverage, code smells, and
# bug detection still apply to them in full.
sonar.cpd.exclusions=packages/adapters/src/generic_ml_cache_adapters/adapter/outbound/api/*_direct_adapter.py
