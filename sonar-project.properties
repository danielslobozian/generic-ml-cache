sonar.organization=danielslobozian
sonar.projectKey=danielslobozian_generic-ml-cache

# Three packages: production sources and their tests.
sonar.sources=packages/core/src,packages/cli/src,packages/daemon/src
sonar.tests=packages/core/tests,packages/cli/tests,packages/daemon/tests

# Exclude the _common symlinks inside cli and daemon: they point to packages/common/src
# which is not a separate distribution and is measured only via the packages that embed it.
sonar.exclusions=**/generic_ml_cache_cli/_common/**,**/generic_ml_cache_daemon/_common/**

# Supported runtimes (matches the CI test matrix).
sonar.python.version=3.9, 3.10, 3.11, 3.12, 3.13

# Coverage reports produced by the CI job (Cobertura XML, one per package).
# Paths inside them are repo-root-relative (see .coveragerc: relative_files = true).
sonar.python.coverage.reportPaths=packages/core/coverage.xml,packages/cli/coverage.xml,packages/daemon/coverage.xml
