name: Release to PyPI

# Publishes both packages to PyPI on a version tag (e.g. v0.2.0), via PyPI Trusted
# Publishing (OIDC — no API token is stored). The two packages are versioned in
# lockstep: bump both pyprojects to the release version, then tag.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [core, cli]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build packages/${{ matrix.package }} --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: dist/

  # core is published first: the cli depends on it, so it must exist on PyPI first.
  publish-core:
    name: Publish generic-ml-cache-core
    needs: build
    runs-on: ubuntu-latest
    # Per-package environment: a pending publisher is unique on
    # (owner, repo, workflow, environment), so the two packages need distinct
    # environments to both register from this one workflow (PyPI monorepo quirk).
    environment: pypi-core
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-core
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-cli:
    name: Publish generic-ml-cache-cli
    needs: publish-core
    runs-on: ubuntu-latest
    environment: pypi-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-cli
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
