name: Release to PyPI

# Publishes all three packages to PyPI on a version tag (e.g. v0.19.0), via PyPI Trusted
# Publishing (OIDC — no API token is stored). The three packages are versioned in
# lockstep from the root VERSION file; bump VERSION, update CHANGELOG, then tag.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Fail fast if the tag does not match the root VERSION file, so a mistagged release
  # (e.g. v0.20.0 pointing at a commit still on 0.19.0) never builds and publishes the
  # wrong version. All three packages read their version from VERSION (dynamic hatchling).
  guard:
    name: Tag matches version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Tag must equal VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(tr -d '[:space:]' < VERSION)"
          if [ "$version" != "$tag" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match VERSION ($version)"
            exit 1
          fi
          echo "tag v$tag matches VERSION $version"

  build:
    name: Build (${{ matrix.package }})
    needs: guard
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [core, cli, daemon]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build packages/${{ matrix.package }} --outdir dist

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.package }}
          path: dist/

  verify:
    name: Verify artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          name: dist-core
          path: dist/
      - uses: actions/download-artifact@v8
        with:
          name: dist-cli
          path: dist/
      - uses: actions/download-artifact@v8
        with:
          name: dist-daemon
          path: dist/

      - name: Check metadata (twine)
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Smoke install from wheels
        run: |
          pip install dist/generic_ml_cache_core-*.whl
          pip install dist/generic_ml_cache_cli-*.whl
          pip install dist/generic_ml_cache_daemon-*.whl
          gmlcache --version
          python -m generic_ml_cache_daemon --help
          python -c "import generic_ml_cache_core, generic_ml_cache_cli, generic_ml_cache_daemon"

  # core is published first: the cli depends on it, so it must exist on PyPI first.
  publish-core:
    name: Publish generic-ml-cache-core
    needs: verify
    runs-on: ubuntu-latest
    # Per-package environment: a pending publisher is unique on
    # (owner, repo, workflow, environment), so the two packages need distinct
    # environments to both register from this one workflow (PyPI monorepo quirk).
    environment: pypi-core
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-core
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-cli:
    name: Publish generic-ml-cache-cli
    needs: publish-core
    runs-on: ubuntu-latest
    environment: pypi-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-cli
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # daemon depends on core, so core must be on PyPI first; cli has no dependency
  # on daemon so publish-cli and publish-daemon can run in parallel after publish-core.
  publish-daemon:
    name: Publish generic-ml-cache-daemon
    needs: publish-core
    runs-on: ubuntu-latest
    environment: pypi-daemon
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-daemon
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
