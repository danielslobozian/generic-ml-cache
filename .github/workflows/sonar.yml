name: Sonar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonar:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so Sonar can attribute new code and blame

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install packages (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/core[dev]"
          pip install -e "packages/adapters[dev,encryption]"
          pip install -e "packages/cli[dev]"
          pip install -e "packages/daemon[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest packages/core/tests    --cov=generic_ml_cache_core    --cov-config=packages/core/pyproject.toml    --cov-report=xml:packages/core/coverage.xml
          python -m pytest packages/adapters/tests --cov=generic_ml_cache_adapters --cov-config=packages/adapters/pyproject.toml --cov-report=xml:packages/adapters/coverage.xml
          python -m pytest packages/cli/tests     --cov=generic_ml_cache_cli     --cov-config=packages/cli/pyproject.toml     --cov-report=xml:packages/cli/coverage.xml
          python -m pytest packages/daemon/tests  --cov=generic_ml_cache_daemon  --cov-config=packages/daemon/pyproject.toml  --cov-report=xml:packages/daemon/coverage.xml

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
