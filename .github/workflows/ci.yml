name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.package }}, ${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        package: [core, adapters, cli, daemon]
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      # Install all four packages (editable) so tests run against in-repo source.
      # core is dependency-free; adapters depends on core; cli/daemon depend on both.
      - name: Install packages (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/core[dev]"
          pip install -e "packages/adapters[dev,encryption]"
          pip install -e "packages/cli[dev]"
          pip install -e "packages/daemon[dev]"

      - name: Run ${{ matrix.package }} tests
        working-directory: packages/${{ matrix.package }}
        run: python -m pytest

  # A single, stable check that rolls up the whole test matrix, so branch
  # protection can require "tests" instead of all 30 (brittle) matrix job names.
  tests:
    name: tests
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() }}
    steps:
      - name: All test matrix jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test matrix did not pass: ${{ needs.test.result }}"
            exit 1
          fi
          echo "all test matrix jobs passed"

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.15"

      - name: Lint
        run: ruff check packages/

      - name: Format check
        run: ruff format --check packages/

  typecheck:
    name: typecheck (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install packages and pyright
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/core[dev]"
          pip install -e "packages/adapters[dev,encryption]"
          pip install -e "packages/cli[dev]"
          pip install -e "packages/daemon[dev]"

      - name: Run pyright
        run: pyright

  import-contracts:
    name: architecture contracts (import-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install packages and import-linter
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/core[dev]"
          pip install -e "packages/adapters[dev,encryption]"
          pip install -e "packages/cli[dev]"
          pip install -e "packages/daemon[dev]"

      - name: Check architecture contracts
        run: lint-imports
