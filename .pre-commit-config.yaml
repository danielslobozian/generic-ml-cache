# .pre-commit-config.yaml — architecture and type-checking gates
#
# These hooks run BEFORE a commit is written. A failing hook rejects the
# commit so malformed code can never reach the local history (and therefore
# can never be pushed).
#
# Both tools are declared as local hooks backed by the project's own .venv,
# so no additional environment is created and no network access is required
# at hook-run time.
#
# Install the git hook once per clone:
#   .venv/bin/pre-commit install
#
# Run manually against all files (e.g. after changing .importlinter):
#   .venv/bin/pre-commit run --all-files

repos:
  - repo: local
    hooks:

      # Gate 1 — ruff linter
      - id: ruff-check
        name: ruff (lint)
        entry: .venv/bin/ruff check packages/
        language: system
        pass_filenames: false
        types: [python]

      # Gate 2 — ruff formatter
      - id: ruff-format
        name: ruff (format check)
        entry: .venv/bin/ruff format --check packages/
        language: system
        pass_filenames: false
        types: [python]

      # Gate 3 — hexagonal import contracts
      # Gate 6 — the hexagonal import contracts declared in .importlinter
      # (application ring, driver→adapter isolation, domain purity, ports-no-usecases,
      # controllers-inbound-only, adapter isolation, bootstrap-as-composition-root, …).
      # A BROKEN contract is an architecture defect, not a style issue.
      - id: lint-imports
        name: import-linter (architecture contracts)
        entry: .venv/bin/lint-imports
        language: system
        pass_filenames: false
        types: [python]

      # Gate 7 — static type checking (pyright standard mode)
      # Zero errors required. See pyrightconfig.json for scope and settings.
      # `type: ignore` is acceptable only for provably safe casts that cannot
      # be expressed in the type system; a comment must explain why.
      # --pythonpath names the interpreter explicitly: pyrightconfig.json no
      # longer carries a venvPath/venv pin (it broke in CI / agent sandboxes
      # that install globally — see CA2/CA10), so each caller names its env.
      - id: pyright
        name: pyright (static type checking)
        entry: .venv/bin/pyright --pythonpath .venv/bin/python
        language: system
        pass_filenames: false
        types: [python]

      # Gate 5 — process guards (IaC-1). Encode AGENTS.md process prose as
      # runnable hooks so the rules can't be "simply not read".

      # No direct commits to main; branch names follow the convention.
      - id: guard-branch
        name: branch guard (no commits to main; naming convention)
        entry: tools/hooks/guard-branch.sh
        language: script
        pass_filenames: false
        always_run: true

      # No AI/assistant attribution in the commit message. Runs at the
      # commit-msg stage — install once with:
      #   .venv/bin/pre-commit install --hook-type commit-msg
      - id: no-ai-attribution
        name: no AI attribution in commit message
        entry: tools/hooks/check-commit-msg.sh
        language: script
        stages: [commit-msg]
